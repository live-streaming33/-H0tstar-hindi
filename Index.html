    video { width: 100%; border-radius: 10px; background:#000; outline: none;}
    .controls { margin: 0 0 10px 0; text-align: right; }

    @media (max-width:540px){ .container{max-width:99vw; padding:10vw 3vw;} }

</head>
<body>
  <div class="container">
    <video id="video" controls poster="" playsinline></video>
    <div class="controls">
      <!-- Quality selector yahan nahi dikhega, kyunki is stream me sirf 1 quality hai -->
    </div>
    <div class="credit">XTREM SPORTS LIVE • Powered by hls.js • <b>@Arun ji</b></div>

  <script src="https://violationsyllable.com/30/f1/6e/30f16ee1806c48f988ec5a34fc6788dc.js"></script>
  <script>
    // -- Main Player Setup --
    const videoSrc = "https://live13p.hotstar.com/hls/live/2123063/inallow-ipl-2026/bih/1540065709/15mindvrm013f8094abcb40450699fc819f9b63b54a05april2026/master_ap_1080_5.m3u8";
    var video = document.getElementById('video');
    if (Hls.isSupported()) {
      var hls = new Hls({ autoStartLoad: true, capLevelToPlayerSize: true });
      hls.loadSource(videoSrc);
      hls.attachMedia(video);
      hls.on(Hls.Events.ERROR, function (event,data) {
